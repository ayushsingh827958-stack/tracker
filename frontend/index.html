<!DOCTYPE html>
<html>

<head>
    <title>Dental Clinic Sale</title>
    <link rel="stylesheet" href="test.css">
</head>

<body>
    <div class="container">
        <div class="section">
            <h1>Dental Clinic Financial Management</h1>
            <h2>Dental Clinic Sale</h2>
        </div>
        <div class="section">
            <h2>Sales</h2>
            <input id="patient" placeholder="Patient Name">
            <input id="amount" placeholder="Amount">

            <button onclick="addSale()">Add Sale</button>
            <button onclick="showSales()">Show Sales</button>

            <ul id="result"></ul>
        </div>
        <div class="section">
            <h2>Expenses</h2>
            <input type="text" id="item" placeholder="Item name">
            <input type="number" id="expense_amount" placeholder="Amount">


            <button onclick="addExpense()">Add</button>
            <button onclick="showExpenses()">Show Expenses</button>


            <ul id="expenseList"></ul>
        </div>

        <div class="container">
            <div class="section">
                <h1>Financial Report</h1>

                <p class="date" id="report-date">Date: --</p>

                <div class="report" id="report">
                    <div><span>Total Sales:</span> <span id="total-sales">Loading...</span></div>
                    <div><span>Total Expenses:</span> <span id="total-expenses">Loading...</span></div>
                    <div><span>Profits:</span> <span id="profits">Loading...</span></div>
                </div>
                <button onclick="generateReport()">Generate Report</button>
            </div>
        </div>
